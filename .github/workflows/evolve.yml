name: evolve

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:

  engine:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          pip install numpy pillow

      - name: run
        run: |
          python collection.py
          python gallery.py

      - name: commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add art/*.png || true
          git add poster/*.png || true
          git add history.json
          git add README.md

          git commit -m "generate poster" || echo "nothing to commit"
          git push
