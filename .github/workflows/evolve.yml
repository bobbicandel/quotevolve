name: evolve

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  engine:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: install
      run: |
        pip install pillow numpy

    - name: generate
      run: |
        python - <<EOF
import collection
import gallery

collection.run()
gallery.update()
EOF

    - name: commit
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add art/*.png
        git add poster/*.png
        git add history.json
        git add README.md

        git commit -m "generate poster" || echo "nothing to commit"
        git push
