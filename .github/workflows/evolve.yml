name: evolve

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:

  engine:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          pip install numpy pillow requests

      - name: fonts
        run: |
          mkdir -p fonts
          curl -L -o fonts/poppins.ttf https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf
          curl -L -o fonts/montserrat.ttf https://github.com/google/fonts/raw/main/ofl/montserrat/Montserrat-Bold.ttf
          curl -L -o fonts/playfair.ttf https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay-Bold.ttf

      - name: run
        run: |
          python collection.py
          python gallery.py

      - name: commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add art/*.png || true
          git add poster/*.png || true
          git add history.json
          git add README.md
          git add fonts || true

          git commit -m "generate poster" || echo "nothing to commit"
          git push
